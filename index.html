<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节日快乐</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fff0f5; /* 浅粉色背景 */
            font-family: "Microsoft YaHei", sans-serif;
        }
        .card {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #ff69b4; font-size: 3rem; }
        p { color: #db7093; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌸 妇女节快乐 🌸</h1>
        <p>致敬每一位闪闪发光的你</p>
    </div>
</body>
</html>
